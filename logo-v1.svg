<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 88" role="img" aria-label="Kartikay Bhardwaj">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap');
    </style>
  </defs>

  <!-- Diamond mark -->
  <path d="M44,10 L78,44 L44,78 L10,44 Z" fill="none" stroke="#A87830" stroke-width="1.5"/>

  <!-- Geometric K inside diamond -->
  <g stroke="#A87830" stroke-width="1.8" stroke-linecap="round" fill="none">
    <line x1="33" y1="26" x2="33" y2="62"/>
    <line x1="33" y1="44" x2="55" y2="26"/>
    <line x1="33" y1="44" x2="55" y2="62"/>
  </g>

  <!-- Wordmark -->
  <text
    x="104" y="36"
    font-family="'Jost', sans-serif"
    font-size="20"
    font-weight="400"
    letter-spacing="3.2"
    fill="currentColor">KARTIKAY</text>

  <line x1="104" y1="44" x2="104" y2="44" stroke="#A87830" stroke-width="0"/>

  <text
    x="106" y="61"
    font-family="'Jost', sans-serif"
    font-size="11"
    font-weight="300"
    letter-spacing="5.8"
    fill="currentColor"
    opacity="0.6">BHARDWAJ</text>

  <!-- Gold accent dash -->
  <line x1="104" y1="68" x2="136" y2="68" stroke="#A87830" stroke-width="1"/>
</svg>
