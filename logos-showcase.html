<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Showcase — Kartikay Bhardwaj</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', sans-serif;
      background: #E8E4DE;
      min-height: 100vh;
      padding: 48px 32px;
    }

    h1 {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #A87830;
      margin-bottom: 40px;
    }

    .logo-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 28px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      margin-bottom: 2px;
    }

    .row-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
      margin: 28px 0 16px;
    }

    /* Panels */
    .panel {
      padding: 56px 48px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .panel-light {
      background: #FAF8F4;
      color: #1A1714;
    }

    .panel-dark {
      background: #0B0A09;
      color: #EDE8DF;
    }

    .panel-light-mid {
      background: #F0EBE2;
      color: #1A1714;
    }

    .panel-dark-mid {
      background: #1A1714;
      color: #EDE8DF;
    }

    /* SVG sizing */
    .panel svg {
      width: auto;
      height: 56px;
      display: block;
    }

    .panel-logo2 svg {
      height: 68px;
    }

    /* Col headers */
    .col-headers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      margin-bottom: 2px;
    }

    .col-header {
      padding: 14px 20px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
      background: #DDD9D3;
      text-align: center;
    }

    /* Divider between logo sets */
    .divider {
      height: 24px;
    }
  </style>
</head>
<body>

  <h1>Logo Showcase &nbsp;·&nbsp; Kartikay Bhardwaj</h1>

  <!-- Column headers -->
  <div class="col-headers">
    <div class="col-header">Light Background</div>
    <div class="col-header">Dark Background</div>
  </div>

  <!-- ── Logo 1 ── -->
  <p class="row-label">Logo 01 &nbsp;— Mark + Wordmark</p>
  <div class="grid">
    <div class="panel panel-light">
      <!-- Logo V1 inline SVG (light) -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 88" role="img" aria-label="Kartikay Bhardwaj">
        <path d="M44,10 L78,44 L44,78 L10,44 Z" fill="none" stroke="#A87830" stroke-width="1.5"/>
        <g stroke="#A87830" stroke-width="1.8" stroke-linecap="round" fill="none">
          <line x1="33" y1="26" x2="33" y2="62"/>
          <line x1="33" y1="44" x2="55" y2="26"/>
          <line x1="33" y1="44" x2="55" y2="62"/>
        </g>
        <text x="104" y="36" font-family="'Jost', sans-serif" font-size="20" font-weight="400" letter-spacing="3.2" fill="currentColor">KARTIKAY</text>
        <text x="106" y="61" font-family="'Jost', sans-serif" font-size="11" font-weight="300" letter-spacing="5.8" fill="currentColor" opacity="0.6">BHARDWAJ</text>
        <line x1="104" y1="68" x2="136" y2="68" stroke="#A87830" stroke-width="1"/>
      </svg>
    </div>
    <div class="panel panel-dark">
      <!-- Logo V1 inline SVG (dark) -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 88" role="img" aria-label="Kartikay Bhardwaj">
        <path d="M44,10 L78,44 L44,78 L10,44 Z" fill="none" stroke="#A87830" stroke-width="1.5"/>
        <g stroke="#A87830" stroke-width="1.8" stroke-linecap="round" fill="none">
          <line x1="33" y1="26" x2="33" y2="62"/>
          <line x1="33" y1="44" x2="55" y2="26"/>
          <line x1="33" y1="44" x2="55" y2="62"/>
        </g>
        <text x="104" y="36" font-family="'Jost', sans-serif" font-size="20" font-weight="400" letter-spacing="3.2" fill="currentColor">KARTIKAY</text>
        <text x="106" y="61" font-family="'Jost', sans-serif" font-size="11" font-weight="300" letter-spacing="5.8" fill="currentColor" opacity="0.7">BHARDWAJ</text>
        <line x1="104" y1="68" x2="136" y2="68" stroke="#A87830" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <!-- Alternate bg tones -->
  <div class="grid">
    <div class="panel panel-light-mid">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 88" role="img" aria-label="Kartikay Bhardwaj">
        <path d="M44,10 L78,44 L44,78 L10,44 Z" fill="none" stroke="#A87830" stroke-width="1.5"/>
        <g stroke="#A87830" stroke-width="1.8" stroke-linecap="round" fill="none">
          <line x1="33" y1="26" x2="33" y2="62"/>
          <line x1="33" y1="44" x2="55" y2="26"/>
          <line x1="33" y1="44" x2="55" y2="62"/>
        </g>
        <text x="104" y="36" font-family="'Jost', sans-serif" font-size="20" font-weight="400" letter-spacing="3.2" fill="currentColor">KARTIKAY</text>
        <text x="106" y="61" font-family="'Jost', sans-serif" font-size="11" font-weight="300" letter-spacing="5.8" fill="currentColor" opacity="0.6">BHARDWAJ</text>
        <line x1="104" y1="68" x2="136" y2="68" stroke="#A87830" stroke-width="1"/>
      </svg>
    </div>
    <div class="panel panel-dark-mid">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 88" role="img" aria-label="Kartikay Bhardwaj">
        <path d="M44,10 L78,44 L44,78 L10,44 Z" fill="none" stroke="#A87830" stroke-width="1.5"/>
        <g stroke="#A87830" stroke-width="1.8" stroke-linecap="round" fill="none">
          <line x1="33" y1="26" x2="33" y2="62"/>
          <line x1="33" y1="44" x2="55" y2="26"/>
          <line x1="33" y1="44" x2="55" y2="62"/>
        </g>
        <text x="104" y="36" font-family="'Jost', sans-serif" font-size="20" font-weight="400" letter-spacing="3.2" fill="currentColor">KARTIKAY</text>
        <text x="106" y="61" font-family="'Jost', sans-serif" font-size="11" font-weight="300" letter-spacing="5.8" fill="currentColor" opacity="0.7">BHARDWAJ</text>
        <line x1="104" y1="68" x2="136" y2="68" stroke="#A87830" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ── Logo 2 ── -->
  <p class="row-label">Logo 02 &nbsp;— Typographic</p>
  <div class="grid">
    <div class="panel panel-light panel-logo2">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 108" role="img" aria-label="Kartikay Bhardwaj">
        <text x="8" y="70" font-family="'Cormorant Garamond', Georgia, serif" font-size="72" font-weight="400" font-style="italic" fill="currentColor" letter-spacing="-1">Kartikay</text>
        <line x1="8" y1="80" x2="372" y2="80" stroke="#A87830" stroke-width="0.8"/>
        <text x="10" y="98" font-family="'Jost', sans-serif" font-size="12" font-weight="300" letter-spacing="8.5" fill="currentColor" opacity="0.65">BHARDWAJ</text>
      </svg>
    </div>
    <div class="panel panel-dark panel-logo2">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 108" role="img" aria-label="Kartikay Bhardwaj">
        <text x="8" y="70" font-family="'Cormorant Garamond', Georgia, serif" font-size="72" font-weight="400" font-style="italic" fill="currentColor" letter-spacing="-1">Kartikay</text>
        <line x1="8" y1="80" x2="372" y2="80" stroke="#A87830" stroke-width="0.8"/>
        <text x="10" y="98" font-family="'Jost', sans-serif" font-size="12" font-weight="300" letter-spacing="8.5" fill="currentColor" opacity="0.7">BHARDWAJ</text>
      </svg>
    </div>
  </div>

  <div class="grid">
    <div class="panel panel-light-mid panel-logo2">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 108" role="img" aria-label="Kartikay Bhardwaj">
        <text x="8" y="70" font-family="'Cormorant Garamond', Georgia, serif" font-size="72" font-weight="400" font-style="italic" fill="currentColor" letter-spacing="-1">Kartikay</text>
        <line x1="8" y1="80" x2="372" y2="80" stroke="#A87830" stroke-width="0.8"/>
        <text x="10" y="98" font-family="'Jost', sans-serif" font-size="12" font-weight="300" letter-spacing="8.5" fill="currentColor" opacity="0.65">BHARDWAJ</text>
      </svg>
    </div>
    <div class="panel panel-dark-mid panel-logo2">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 108" role="img" aria-label="Kartikay Bhardwaj">
        <text x="8" y="70" font-family="'Cormorant Garamond', Georgia, serif" font-size="72" font-weight="400" font-style="italic" fill="currentColor" letter-spacing="-1">Kartikay</text>
        <line x1="8" y1="80" x2="372" y2="80" stroke="#A87830" stroke-width="0.8"/>
        <text x="10" y="98" font-family="'Jost', sans-serif" font-size="12" font-weight="300" letter-spacing="8.5" fill="currentColor" opacity="0.7">BHARDWAJ</text>
      </svg>
    </div>
  </div>

</body>
</html>
